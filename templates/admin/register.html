<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | VoteGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="admin-page">
    <div class="container-center">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-lockup">
                    <img src="{{ url_for('static', filename='img/voteguard-mark.svg') }}" alt="VoteGuard logo" class="brand-mark">
                    <div class="brand-copy">
                        <span class="brand-name">VoteGuard</span>
                        <span class="brand-subtitle">Admin Setup</span>
                    </div>
                </div>
            </div>
            <div class="auth-header">
                <h1>Admin Register</h1>
                <p>Create a new VoteGuard administrator account.</p>
            </div>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form id="adminRegisterForm" method="POST">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="admin@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Choose a strong password">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repeat your password">
                </div>

                <div class="form-group">
                    <label for="secret_key">Registration Key</label>
                    <input type="password" id="secret_key" name="secret_key" required placeholder="Enter the admin registration key">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Create Admin Account</button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('admin.login') }}">Back to Login</a>
                &nbsp;&nbsp;|&nbsp;&nbsp;
                <a href="{{ url_for('index') }}">Back to VoteGuard Home</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        document.getElementById('adminRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            if (data.password !== data.confirm_password) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            const submitBtn = e.target.querySelector('[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                const response = await fetch('{{ url_for("admin.register") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showAlert('Admin account created successfully. Redirecting to login...', 'success');
                    setTimeout(() => window.location.href = result.redirect, 1500);
                } else {
                    showAlert(result.error || 'Registration failed. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Admin Account';
                }
            } catch (err) {
                showAlert('Registration failed. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Admin Account';
            }
        });
    </script>
</body>
</html>
