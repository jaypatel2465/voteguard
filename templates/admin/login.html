<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | VoteGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="admin-page">
    <div class="container-center">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-lockup">
                    <img src="{{ url_for('static', filename='img/voteguard-mark.svg') }}" alt="VoteGuard logo" class="brand-mark">
                    <div class="brand-copy">
                        <span class="brand-name">VoteGuard</span>
                        <span class="brand-subtitle">Admin Access</span>
                    </div>
                </div>
            </div>
            <div class="auth-header">
                <h1>Admin Login</h1>
                <p>Sign in to the VoteGuard administration workspace.</p>
            </div>

            {% if error %}
            <div class="alert alert-error">
                {{ error }}
            </div>
            {% endif %}

            <form id="adminLoginForm" method="POST">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required value="admin@voting.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required value="admin">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-footer">
                <a href="{{ url_for('admin.register') }}">Register as Admin</a>
                &nbsp;&nbsp;|&nbsp;&nbsp;
                <a href="{{ url_for('index') }}">Back to VoteGuard Home</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const response = await fetch('{{ url_for("admin.login") }}', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = result.redirect;
                } else {
                    showAlert(result.error, 'error');
                }
            } catch (error) {
                showAlert('Login failed. Please try again.', 'error');
            }
        });
    </script>
</body>
</html>
